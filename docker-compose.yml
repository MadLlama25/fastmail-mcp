services:
  fastmail-mcp:
    build: .
    container_name: fastmail-mcp
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - FASTMAIL_API_TOKEN=${FASTMAIL_API_TOKEN}
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      - MCP_HTTP_PORT=3000
    networks:
      - caddy_net

networks:
  caddy_net:
    external: true
