name: Build and Release DXT

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# Least privilege: the only elevated need is creating the release + uploading
# the .dxt asset. Everything else runs read-only.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack DXT
        run: npx --yes @anthropic-ai/dxt@0.2.6 pack

      - name: Compute version and rename artifact
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          FILE=$(ls -1 *.dxt | head -n1)
          mv "$FILE" "fastmail-mcp-$VERSION.dxt"
          echo "DXT_FILE=fastmail-mcp-$VERSION.dxt" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fastmail-mcp-dxt
          path: ${{ env.DXT_FILE }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: ${{ env.DXT_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
