name: Secret & PII scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Read-only: this workflow only inspects the checked-out tree.
permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Scan tracked files for secrets and personal information
        run: node scripts/scan-secrets.mjs --all
